worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Single entrypoint for the whole stack: the frontend and the API are
    # served from one origin (this gateway), so the browser never makes a
    # cross-origin request between them - no CORS config needed for this path.
    server {
        listen 80;

        # Match /api/v1/ specifically (not the broader /api/) - Nuxt's own
        # Nitro server reserves /api/ for its own server routes too (e.g.
        # Nuxt Icon serves icon SVGs from /api/_nuxt_icon/...), so a wildcard
        # /api/ location here would wrongly swallow those into the backend.
        #
        # No path rewrite: proxy_pass has no URI component, so nginx forwards
        # the request URI unchanged - the backend's own routes already live
        # under /api/v1/..., so /api/v1/contacts here reaches the same path
        # on the api service.
        location /api/v1/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else goes to the Nuxt server. Upgrade headers are
        # included so this config also works unmodified against `nuxt dev`
        # (Vite HMR over WebSocket) if the frontend service is ever swapped
        # to dev mode.
        location / {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
