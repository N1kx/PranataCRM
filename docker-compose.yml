services:
  db:
    image: pgvector/pgvector:pg15
    container_name: pranata_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pranata_crm
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pranata_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pranata_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pranata_api
    restart: unless-stopped
    ports:
      - "8230:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/pranata_crm
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      JWT_SECRET_KEY: dev-secret-change-in-production
    # Bind-mounts the source over the image's baked-in copy, so local edits
    # apply immediately - combined with --reload, no rebuild is needed.
    volumes:
      - ./backend:/app
    command: ["--reload"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relative path: resolved against whatever origin serves the page.
        # The gateway proxies both / (this service) and /api (the api
        # service) from a single origin, so the browser never makes a
        # cross-origin request and no CORS config is needed for this flow.
        NUXT_PUBLIC_API_BASE: /api/v1
        # Keep "development" (not "production") even in this containerized
        # stack: production mode resolves the tenant from a real subdomain,
        # which this local setup does not have. Development mode sends the
        # tenant via the X-Tenant-Slug header instead, which does work here.
        NUXT_PUBLIC_APP_ENV: development
    container_name: pranata_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  gateway:
    image: nginx:alpine
    container_name: pranata_gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
